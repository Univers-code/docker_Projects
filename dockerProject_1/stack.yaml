version: "3.9"

services:

  mysql:
    image: mysql:8
    networks:
      - backend_net
    volumes:
      - mysql_data:/var/lib/mysql
    secrets:
      - mysql_root_password
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: mydatabase
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  backend:
    image: backend_image
    networks:
      - backend_net
      - frontend_net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx_image
    ports:
      - "80:80"
    networks:
      - frontend_net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

networks:
  frontend_net:
    driver: overlay
  backend_net:
    driver: overlay

volumes:
  mysql_data:

secrets:
  mysql_root_password:
    external: true