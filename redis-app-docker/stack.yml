version: "3.9"

services:

  redis:
    image: redis
    volumes:
      - redis-data:/data

  api:
    image: zvunivers/fastapi-app:v1
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis
    deploy:
      replicas: 2

  worker:
    image: zvunivers/fastapi-app:v1
    command: python worker/worker.py
    depends_on:
      - redis
    deploy:
      replicas: 2

volumes:
  redis-data:
